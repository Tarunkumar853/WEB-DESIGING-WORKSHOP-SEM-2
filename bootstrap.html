<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Example</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <h1 class="text-primary text-center">Hello Bootstrap</h1>
    <div class="container bg-dark text-white p-3">Fixed Width Container</div>
    <div class="container-fluid bg-warning p-3">Full Width Container</div>
    <div class="container">
        <div class="row">
            <div class="col bg-primary text-white p-3">Column 1</div>
            <div class="col bg-success text-white p-3">Column 2</div>
            <div class="col bg-danger text-white p-3">Column 3</div>
        </div>
        <div class="col-4 bg-danger text-white p-3">4 Columns</div>
        <div class="col-4 bg-warning text-white p-3">8 Columns</div>
    </div>




    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
